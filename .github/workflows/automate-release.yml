name: Automate Release

"on":
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in SemVer format (example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  automate-release:
    name: Bump Version and Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}
      RELEASE_TAG: v${{ github.event.inputs.version }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Validate version input
        run: |
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version: $RELEASE_VERSION"
            echo "Expected format: MAJOR.MINOR.PATCH (example: 1.2.3)"
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          git fetch origin --tags
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "❌ Tag $RELEASE_TAG already exists"
            exit 1
          fi

      - name: Install Rust toolchain (for version update validation)
        uses: dtolnay/rust-toolchain@stable

      - name: Update version and create release commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "Current version in Cargo.toml: $CURRENT_VERSION"
          echo "Target release version: $RELEASE_VERSION"

          sed -i "s/^version = \".*\"/version = \"$RELEASE_VERSION\"/" Cargo.toml

          UPDATED_VERSION=$(grep '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ "$UPDATED_VERSION" != "$RELEASE_VERSION" ]; then
            echo "❌ Failed to update Cargo.toml"
            exit 1
          fi

          # Refresh Cargo.lock
          cargo check

          git add Cargo.toml Cargo.lock
          git commit -m "Release v$RELEASE_VERSION"

          echo "✅ Version updated to $RELEASE_VERSION"

      - name: Run tests before pushing
        run: |
          cargo test --verbose
          cargo test --test integration_tests --verbose
          cargo fmt -- --check
          cargo clippy -- -D warnings

      - name: Push to main
        run: |
          git push origin main
          echo "✅ Changes pushed to main"

      - name: Install Rust toolchain (for release build)
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build deb package
        run: |
          cargo deb --no-build
          DEB_FILE=$(ls target/debian/*.deb | head -1)
          cp "$DEB_FILE" ai-cli-v$RELEASE_VERSION-amd64.deb

      - name: Create release archives
        run: |
          mkdir -p artifacts
          cp target/release/ai-cli artifacts/
          cd artifacts
          tar -czf ../ai-cli-v$RELEASE_VERSION-linux-x86_64.tar.gz *
          cd ..
          zip -r ai-cli-v$RELEASE_VERSION-linux-x86_64.zip artifacts/

      - name: Verify artifacts
        run: |
          echo "Artifacts created:"
          ls -lh ai-cli-*.tar.gz ai-cli-*.zip ai-cli-*.deb 2>/dev/null || echo "No artifacts found"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ai-cli-v${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz
            ai-cli-v${{ env.RELEASE_VERSION }}-linux-x86_64.zip
            ai-cli-v${{ env.RELEASE_VERSION }}-amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
